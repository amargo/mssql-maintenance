name: Build and Publish

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'crontab'
      - 'scripts/**'
      - '.github/workflows/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'crontab'
      - 'scripts/**'
      - '.github/workflows/**'
  release:
    types: [published]

jobs:
  build-and-push-docker-image:
    name: Build image
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: mssql-maintenance
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get Next Version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "/\\w+\\!:|BREAKING CHANGE:/"
          minor_pattern: "/^feat(\\(\\w+\\))?:/"
          patch_pattern: "/^fix(\\(\\w+\\))?:/"
          version_format: "${major}.${minor}.${patch}"

      - name: Prepare Docker tags
        id: docker-tags
        run: |
          REF_NAME="${GITHUB_REF_NAME//\//-}"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "branch_sha=${REF_NAME}-${SHORT_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          flavor: latest=true
          images: |
            ghcr.io/${{ github.repository }}
            docker.io/gszoboszlai/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=${{ steps.semver.outputs.version }},enable=${{ github.ref_name == 'main' }}
            type=raw,value=${{ steps.semver.outputs.major }}.${{ steps.semver.outputs.minor }},enable=${{ github.ref_name == 'main' }}
            type=raw,value=${{ steps.docker-tags.outputs.branch_sha }},enable=${{ github.ref_type == 'branch' }}

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Log into GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Log into Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            ${{ steps.meta.outputs.labels }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker image
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          docker pull $TAG
          docker run --rm --entrypoint sqlcmd $TAG --version
